<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaxiCall - Transporte Rápido</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #000;
      color: #fff;
    }

    header {
      position: relative;
      padding: 60px 20px;
      color: white;
      overflow: hidden;
      min-height: 420px;
    }

    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("carro.jpg") center/cover no-repeat;
      transform: scaleX(-1);
      z-index: 0;
    }

    header::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1;
    }

    header * {
      position: relative;
      z-index: 2;
    }

    /* 🔥 LOGO MAIOR E MAIS DESTACADA */
    .logo {
      width: 320px;
      max-width: 90%;
      height: auto;
      margin-bottom: 15px;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 18px;
      opacity: 0.9;
    }

    .container {
      padding: 30px 20px;
    }

    .card {
      background: #111;
      color: #fff;
      margin: 20px auto;
      max-width: 600px;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(255,255,255,0.05);
      border: 1px solid #222;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 10px auto;
      padding: 14px 22px;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      max-width: 300px;
    }

    .btn-whatsapp { background: #25D366; }
    .btn-call { background: #007BFF; }
    .btn-app { background: #222; }
    .btn-insta { background: #E1306C; }

    footer {
      margin-top: 40px;
      padding: 25px;
      font-size: 13px;
      color: #aaa;
      text-align: center;
    }

    /* BOTÕES FLUTUANTES */
    .float-btn {
      position: fixed;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: white;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 999;
    }

    .whatsapp-float {
      bottom: 20px;
      right: 20px;
      background: #25D366;
    }

    .call-float {
      bottom: 90px;
      right: 20px;
      background: #007BFF;
    }

    .insta-float {
      bottom: 160px;
      right: 20px;
      background: #E1306C;
    }

  </style>
</head>

<body>

  <header>

    <!-- 🚖 LOGO ÚNICA (SEM TEXTO EMBAIXO) -->
    <img src="logo.png" alt="TaxiCall Logo" class="logo">

    <div class="subtitle">Seu transporte rápido, seguro e fácil</div>

  </header>

  <div class="container">

    <div class="card">
      <h2>📲 Baixe nosso App</h2>

      <a class="btn btn-app" href="https://play.google.com/store/apps/details?id=net.taxidigital.taxiCall&hl=pt-BR" target="_blank">
        Baixar App TaxiCall
      </a>
    </div>

    <div class="card">
      <h2>📞 Central de Atendimento</h2>

      <a class="btn btn-call" href="tel:552126056777">Ligar 2605-6777</a>
      <a class="btn btn-call" href="tel:552126052184">Ligar 2605-2184</a>
      <a class="btn btn-call" href="tel:552126054668">Ligar 2605-4668</a>
      <a class="btn btn-call" href="tel:552126040101">Ligar 2604-0101</a>

    </div>

    <div class="card">
      <h2>💬 WhatsApp</h2>

      <a class="btn btn-whatsapp" href="https://wa.me/552126052398" target="_blank">
        Chamar no WhatsApp
      </a>
    </div>

  </div>

  <!-- FLUTUANTES -->
  <a class="float-btn whatsapp-float" href="https://wa.me/552126052398">💬</a>
  <a class="float-btn call-float" href="tel:552126056777">📞</a>
  <a class="float-btn insta-float" href="https://www.instagram.com/taxicallcooperativa?igsh=MTFicmlwNGs0bXYxcg==">📸</a>

  <footer>
    © 2026 TaxiCall - Todos os direitos reservados <br>
    CNPJ: 02.542.813/0001-39
  </footer>

</body>
</html>
